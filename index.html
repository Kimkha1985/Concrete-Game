<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Lua Ve Nha V40 ULTRA 🔥</title>

<style>

body{
font-family:Arial;
background:#0a2342;
color:white;
margin:0;
}

h3{
margin:5px 0 10px 0;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#112f55;
padding:12px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

iframe{
width:100%;
height:150px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

.clock{
font-size:32px;
color:#00ffff;
text-align:center;
}

#news a{
color:#ffd700;
text-decoration:none;
display:block;
margin-bottom:8px;
}

.footer{
text-align:center;
padding:20px;
font-size:18px;
}

.footer a{
color:#00ffff;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

.sakura{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<script>

function clock(){
let now=new Date()

document.getElementById("vnclock").innerHTML=
now.toLocaleTimeString("vi-VN")

document.getElementById("worldclock").innerHTML=
now.toLocaleTimeString("en-US",{timeZone:"UTC"})
}

setInterval(clock,1000)
clock()

async function crypto(){

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd"
)

let d=await r.json()

btc.innerHTML=d.bitcoin.usd+" $"
eth.innerHTML=d.ethereum.usd+" $"
bnb.innerHTML=d.binancecoin.usd+" $"
okb.innerHTML=d.okb.usd+" $"
sui.innerHTML=d.sui.usd+" $"

}

crypto()
setInterval(crypto,30000)

async function gold(){

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd"
)

let d=await r.json()

gold.innerHTML=d["pax-gold"].usd+" USD"

}

gold()

async function footballNews(){

let feeds=[
"https://vnexpress.net/rss/the-thao.rss",
"https://bongdaplus.vn/rss",
"https://www.espn.com/espn/rss/soccer/news"
]

let html=""

for(let f of feeds){

try{

let r=await fetch(
"https://api.rss2json.com/v1/api.json?rss_url="+f
)

let d=await r.json()

for(let i=0;i<2;i++){

let n=d.items[i]

html+=`<a href="${n.link}" target="_blank">⭐ ${n.title}</a>`

}

}catch(e){}

}

news.innerHTML=html

}

footballNews()
setInterval(footballNews,300000)

function sakura(){

let f=document.createElement("div")

f.className="sakura"
f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},20000)

}

setInterval(sakura,800)

</script>

</body>
</html>
