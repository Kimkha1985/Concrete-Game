<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LuaVeNha V27 PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#071c36;
color:white;
}

header{
text-align:center;
font-size:34px;
padding:20px;
background:#021126;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0a2c55;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px #000;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

iframe{
width:100%;
height:200px;
border:none;
border-radius:10px;
}

.music-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:12px;
}

#earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#clock{
font-size:60px;
text-align:center;
color:#00ffff;
}

footer{
text-align:center;
padding:20px;
background:#021126;
}

.sakura{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<header>LuaVeNha V27 PRO</header>

<div class="grid">

<div class="card">
<h3>Clock</h3>
<div id="clock"></div>
</div>

<div class="card">
<h3>Weather</h3>
<div id="weather">Loading...</div>
</div>

<div class="card">
<h3>Earth</h3>
<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div>

<div class="card">
<h3>Crypto</h3>
<table>
<tr><th>Coin</th><th>Price</th></tr>
<tr><td>BTC</td><td id="btc"></td></tr>
<tr><td>ETH</td><td id="eth"></td></tr>
<tr><td>SOL</td><td id="sol"></td></tr>
<tr><td>OKB</td><td id="okb"></td></tr>
<tr><td>SUI</td><td id="sui"></td></tr>
</table>
</div>

<div class="card">
<h3>Gold</h3>
<div id="gold">Loading...</div>
</div>

<div class="card">
<h3>Oil</h3>
<div id="oil">Loading...</div>
</div>

<div class="card">
<h3>US Stocks</h3>
<div id="stocks">
NASDAQ<br>
S&P500<br>
Dow Jones
</div>
</div>

<div class="card">
<h3>Premier League</h3>
<table>
<tr><th>#</th><th>Team</th><th>Pts</th></tr>
<tr><td>1</td><td>Man City</td><td>88</td></tr>
<tr><td>2</td><td>Arsenal</td><td>84</td></tr>
<tr><td>3</td><td>Liverpool</td><td>82</td></tr>
</table>
</div>

<div class="card">
<h3>La Liga</h3>
<table>
<tr><th>#</th><th>Team</th><th>Pts</th></tr>
<tr><td>1</td><td>Real Madrid</td><td>95</td></tr>
<tr><td>2</td><td>Barcelona</td><td>85</td></tr>
<tr><td>3</td><td>Girona</td><td>81</td></tr>
</table>
</div>

</div>

<div class="card">

<h2>Music</h2>

<div class="music-grid">

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/KbEM5vf0XGI"></iframe>
<iframe src="https://www.youtube.com/embed/dsaXgVd5cps"></iframe>
<iframe src="https://www.youtube.com/embed/w_kgRzsEXeM"></iframe>
<iframe src="https://www.youtube.com/embed/l3gNl5Pz1Z8"></iframe>
<iframe src="https://www.youtube.com/embed/3OeEinNn--E"></iframe>
<iframe src="https://www.youtube.com/embed/8Vqlecx98U4"></iframe>
<iframe src="https://www.youtube.com/embed/LmGERikvn6w"></iframe>
<iframe src="https://www.youtube.com/embed/35TSAMLvzJQ"></iframe>

</div>

</div>

<footer>

<a href="https://github.com">GitHub</a> |
<a href="https://x.com">X</a>

</footer>

<script>

function clock(){
let now=new Date()
document.getElementById("clock").innerHTML=
now.toLocaleTimeString("vi-VN")
}
setInterval(clock,1000)

async function weather(){
let r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true")
let d=await r.json()
document.getElementById("weather").innerHTML=
d.current_weather.temperature+" °C"
}
weather()
setInterval(weather,60000)

async function crypto(){
let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,okb,sui&vs_currencies=usd")
let d=await r.json()

document.getElementById("btc").innerHTML=d.bitcoin.usd+" $"
document.getElementById("eth").innerHTML=d.ethereum.usd+" $"
document.getElementById("sol").innerHTML=d.solana.usd+" $"
document.getElementById("okb").innerHTML=d.okb.usd+" $"
document.getElementById("sui").innerHTML=d.sui.usd+" $"
}

crypto()
setInterval(crypto,30000)

function sakura(){

let f=document.createElement("div")

f.className="sakura"
f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},20000)

}

setInterval(sakura,900)

</script>

</body>
</html>
