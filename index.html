<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Lua Ve Nha Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== BACKGROUND ===== */

body{

margin:0;
font-family:Arial;

background:
url("https://i.imgur.com/Vp6L0yD.jpg");

background-size:cover;
color:white;

}

/* ===== GRID ===== */

.container{

display:grid;

grid-template-columns:
330px 1fr 330px;

gap:18px;

padding:20px;

}

/* ===== CARD ===== */

.card{

background:rgba(0,0,0,0.55);

backdrop-filter:blur(12px);

border-radius:18px;

padding:16px;

box-shadow:0 0 20px #00eaff;

}

/* ===== TITLES ===== */

.title{

font-size:20px;

color:#00eaff;

margin-bottom:10px;

}

/* ===== MUSIC ===== */

iframe{

width:100%;

height:170px;

border:none;

border-radius:10px;

margin-bottom:10px;

}

/* ===== CLOCK ===== */

.clock{

font-size:48px;

text-align:center;

color:#00ffff;

}

/* ===== WEATHER ===== */

.weather{

display:flex;

justify-content:space-between;

font-size:14px;

margin-top:10px;

}

/* ===== CRYPTO ===== */

.crypto div{

display:flex;

justify-content:space-between;

padding:6px;

border-bottom:1px solid rgba(255,255,255,0.1);

}

/* ===== NEWS ===== */

.news li{

margin-bottom:10px;

}

/* ===== EARTH ===== */

.earth{

width:100%;

border-radius:50%;

animation:spin 40s linear infinite;

}

@keyframes spin{

from{transform:rotate(0)}

to{transform:rotate(360deg)}

}

/* ===== FOOTER ===== */

.footer{

text-align:center;

margin-top:30px;

padding:30px;

}

.footer a{

font-size:20px;

margin:10px;

padding:12px 20px;

background:rgba(0,0,0,0.5);

border-radius:12px;

text-decoration:none;

color:#00ffff;

box-shadow:0 0 20px #00ffff;

}

.footer a:hover{

transform:scale(1.1);

}

</style>

</head>

<body>

<div class="container">

<!-- LEFT MUSIC -->

<div class="card">

<div class="title">🎵 Music</div>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/dsaXgVd5cps"></iframe>
<iframe src="https://www.youtube.com/embed/w_kgRzsEXeM"></iframe>
<iframe src="https://www.youtube.com/embed/l3gNl5Pz1Z8"></iframe>

</div>

<!-- CENTER -->

<div>

<div class="card">

<div class="title">🕒 Giờ Việt Nam</div>

<div id="clock" class="clock"></div>

</div>

<div class="card">

<div class="title">🌤 Weather HCM</div>

<div id="weather"></div>

</div>

<div class="card crypto">

<div class="title">₿ Crypto Market</div>

<div>BTC <span id="btc"></span></div>
<div>ETH <span id="eth"></span></div>
<div>BNB <span id="bnb"></span></div>
<div>OKB <span id="okb"></span></div>
<div>SUI <span id="sui"></span></div>

</div>

<div class="card">

<div class="title">🪙 Gold</div>

<div id="gold"></div>

</div>

<div class="card">

<div class="title">🙏 Nhạc Phật</div>

<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/Sk0Re5Wa-QI"></iframe>
<iframe src="https://www.youtube.com/embed/07QO_01Xl5s"></iframe>
<iframe src="https://www.youtube.com/embed/pw1MZFrJCMw"></iframe>
<iframe src="https://www.youtube.com/embed/x1ss2eVlDgs"></iframe>

</div>

</div>

<!-- RIGHT -->

<div>

<div class="card">

<div class="title">🌍 Earth</div>

<img class="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

</div>

<div class="card">

<div class="title">⚽ Football News</div>

<ul class="news">

<li>Real Madrid thắng Barcelona 3-2</li>
<li>Mbappe lập hattrick</li>
<li>Messi ghi bàn phút 90</li>
<li>Ronaldo đưa Al Nassr vào chung kết</li>
<li>Inter dẫn đầu Serie A</li>

</ul>

</div>

<div class="card">

<div class="title">🎵 Music</div>

<iframe src="https://www.youtube.com/embed/3OeEinNn--E"></iframe>
<iframe src="https://www.youtube.com/embed/8Vqlecx98U4"></iframe>
<iframe src="https://www.youtube.com/embed/LmGERikvn6w"></iframe>
<iframe src="https://www.youtube.com/embed/35TSAMLvzJQ"></iframe>

</div>

</div>
