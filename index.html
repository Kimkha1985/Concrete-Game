<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lua Ve Nha V40 ULTRA</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0a1f3d,#0c2f5a);
color:white;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
padding:15px;
max-width:1200px;
margin:auto;
}

.card{
background:#0f2c55;
padding:12px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

h3{
margin-top:0;
color:#9fe3ff;
}

iframe{
width:100%;
height:150px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

.clock{
font-size:34px;
color:#00ffff;
text-align:center;
}

#news a{
display:block;
color:#00ffe5;
font-weight:bold;
margin-bottom:8px;
text-decoration:none;
}

.footer{
text-align:center;
padding:20px;
}

.footer a{
color:#00ffff;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

.sakura{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT MUSIC -->

<div class="card">

<h3>🎵 Music</h3>

<iframe src="https://www.youtube.com/embed/pw1MZFrJCMw"></iframe>

<iframe src="https://www.youtube.com/embed/x1ss2eVlDgs"></iframe>

<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>

<iframe src="https://www.youtube.com/embed/07QO_01Xl5s"></iframe>

<iframe src="https://www.youtube.com/embed/fLexgOxsZu0"></iframe>

<iframe src="https://www.youtube.com/embed/OPf0YbXqDm0"></iframe>

</div>

<!-- CENTER -->

<div>

<div class="card">
<h3>🕒 Giờ Việt Nam</h3>
<div id="vnclock" class="clock"></div>
</div>

<div class="card">
<h3>🌍 Giờ Quốc Tế</h3>
<div id="worldclock" class="clock"></div>
</div>

<div class="card">
<h3>💰 Crypto</h3>
BTC <span id="btc"></span><br>
ETH <span id="eth"></span><br>
BNB <span id="bnb"></span><br>
</div>

<div class="card">
<h3>🥇 Gold</h3>
<div id="gold"></div>
</div>

<div class="card">

<h3>🙏 Nhạc Phật</h3>

<iframe src="https://www.youtube.com/embed/pw1MZFrJCMw"></iframe>

<iframe src="https://www.youtube.com/embed/x1ss2eVlDgs"></iframe>

<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>

<iframe src="https://www.youtube.com/embed/07QO_01Xl5s"></iframe>

</div>

</div>

<!-- RIGHT -->

<div>

<div class="card">

<h3>🌍 Earth</h3>

<iframe src="https://www.youtube.com/embed/1Zt7J6bP6KQ"></iframe>

</div>

<div class="card">

<h3>⚽ Football News</h3>

<div id="news"></div>

</div>

<div class="card">

<h3>🎵 Music</h3>

<iframe src="https://www.youtube.com/embed/JGwWNGJdvx8"></iframe>

<iframe src="https://www.youtube.com/embed/kXYiU_JCYtU"></iframe>

<iframe src="https://www.youtube.com/embed/eVTXPUF4Oz4"></iframe>

<iframe src="https://www.youtube.com/embed/tAGnKpE4NCI"></iframe>

</div>

</div>

</div>

<div class="footer">

<a href="https://github.com/kimkha1985">github.com/kimkha1985</a>

|

<a href="https://x.com/ChauKimKha">x.com/ChauKimKha</a>

</div>

<script>

function clock(){

let now=new Date()

vnclock.innerHTML=now.toLocaleTimeString("vi-VN")

worldclock.innerHTML=now.toLocaleTimeString("en-US",{timeZone:"UTC"})

}

setInterval(clock,1000)

clock()

async function footballNews(){

let feeds=[
"https://vnexpress.net/rss/the-thao.rss",
"https://bongdaplus.vn/rss",
"https://www.espn.com/espn/rss/soccer/news"
]

let html=""

for(let f of feeds){

try{

let r=await fetch("https://api.rss2json.com/v1/api.json?rss_url="+f)

let d=await r.json()

for(let i=0;i<2;i++){

let n=d.items[i]

html+=`<a href="${n.link}" target="_blank">⭐ ${n.title}</a>`

}

}catch(e){}

}

document.getElementById("news").innerHTML=html

}

footballNews()

setInterval(footballNews,300000)

function sakura(){

let f=document.createElement("div")

f.className="sakura"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),20000)

}

setInterval(sakura,900)

</script>

</body>
</html>
