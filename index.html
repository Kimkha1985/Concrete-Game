<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>🔥 Lua Ve Nha V41 ULTRA 🔥</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1f33;
color:white;
}

h2{
text-align:center;
padding:10px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
padding:10px;
}

.card{
background:#0e2a47;
padding:10px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

iframe{
width:100%;
height:160px;
border:none;
border-radius:8px;
}

.music-grid{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.center-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.clock{
font-size:32px;
color:#00ffff;
font-weight:bold;
text-align:center;
}

#news a{
color:#FFD700;
display:block;
margin-bottom:6px;
font-weight:bold;
text-decoration:none;
}

#news a:hover{
color:white;
}

table{
width:100%;
}

td{
padding:4px;
}

footer{
text-align:center;
padding:15px;
font-size:20px;
}

footer a{
color:#00ffff;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

footer a:hover{
color:#FFD700;
}

.earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

</style>
</head>

<h2>🔥 Lua Ve Nha V41 ULTRA 🔥</h2>

<iframe src="https://www.youtube.com/embed/3OeEinNn--E"></iframe>

<script>

/* CLOCK */

function updateClock(){

let vn=new Date().toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})
document.getElementById("clockVN").innerHTML=vn

let world=new Date().toLocaleTimeString("en-US",{timeZone:"UTC"})
document.getElementById("clockWorld").innerHTML=world

}

setInterval(updateClock,1000)
updateClock()


/* WEATHER */

async function weather(){

let r=await fetch("https://wttr.in/Ho+Chi+Minh?format=3")
let d=await r.text()
document.getElementById("weather").innerHTML=d

}

weather()
setInterval(weather,600000)


/* CRYPTO */

async function crypto(){

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd"
)

let d=await r.json()

btc.innerHTML=d.bitcoin.usd+" $"
eth.innerHTML=d.ethereum.usd+" $"
bnb.innerHTML=d.binancecoin.usd+" $"
okb.innerHTML=d.okb.usd+" $"
sui.innerHTML=d.sui.usd+" $"

}

crypto()
setInterval(crypto,30000)


/* GOLD */

async function gold(){

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd"
)

let d=await r.json()

gold.innerHTML=d["pax-gold"].usd+" USD"

}

gold()
setInterval(gold,60000)


/* NEWS */

async function news(){

let r=await fetch(
"https://api.rss2json.com/v1/api.json?rss_url=https://vnexpress.net/rss/the-thao.rss"
)

let d=await r.json()

let html=""

for(let i=0;i<6;i++){

let n=d.items[i]

html+=`<a href="${n.link}" target="_blank">${n.title}</a>`

}

news.innerHTML=html

}

news()
setInterval(news,300000)

</script>

</body>
</html>
