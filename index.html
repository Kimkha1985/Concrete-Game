<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LuaVeNha Ultimate V24</title>

<style>

body{
background:#071a2f;
font-family:Arial;
color:white;
margin:0;
overflow-x:hidden;
}

header{
text-align:center;
padding:20px;
font-size:28px;
background:#021126;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0a2548;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px #000;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

iframe{
width:100%;
height:200px;
border:none;
}

#earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

footer{
text-align:center;
padding:20px;
background:#021126;
}

a{color:#6db6ff}

.sakura{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<header>LuaVeNha Ultimate V24</header>

<div class="grid">

<div class="card">
<h3>Đồng hồ thế giới</h3>
<div id="clock"></div>
</div>

<div class="card">
<h3>Thời tiết Việt Nam</h3>
<div id="weather">Đang tải...</div>
</div>

<div class="card">
<h3>Trái đất</h3>
<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div>

<div class="card">
<h3>Crypto Market</h3>
<table id="crypto"></table>
</div>

<div class="card">
<h3>Top 20 Crypto</h3>
<table id="topcrypto"></table>
</div>

<div class="card">
<h3>Giá vàng</h3>
<div id="gold">Loading...</div>
</div>

<div class="card">
<h3>Bảng xếp hạng bóng đá</h3>

<a href="https://www.flashscore.com/football/england/premier-league/">Premier League</a><br>
<a href="https://www.flashscore.com/football/spain/laliga/">La Liga</a><br>
<a href="https://www.flashscore.com/football/italy/serie-a/">Serie A</a><br>
<a href="https://www.flashscore.com/football/germany/bundesliga/">Bundesliga</a><br>
<a href="https://www.flashscore.com/football/france/ligue-1/">Ligue 1</a>

</div>

<div class="card">
<h3>Tin tức bóng đá</h3>

<a href="https://24h.com.vn/bong-da/">24h.com.vn</a><br>
<a href="https://bongdaplus.vn/">Bongdaplus.vn</a><br>
<a href="https://vnexpress.net/the-thao">VnExpress</a>

</div>

<div class="card">

<h3>Nhạc</h3>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/KbEM5vf0XGI"></iframe>

</div>

</div>

<footer>

<a href="https://github.com">GitHub</a> |
<a href="https://x.com">X</a>

</footer>

<script>

function updateClock(){

let now=new Date()

document.getElementById("clock").innerHTML=

"VN: "+now.toLocaleTimeString("vi-VN")+"<br>"+
"New York: "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})+"<br>"+
"London: "+now.toLocaleTimeString("en-GB",{timeZone:"Europe/London"})+"<br>"+
"Madrid: "+now.toLocaleTimeString("es-ES",{timeZone:"Europe/Madrid"})+"<br>"+
"Paris: "+now.toLocaleTimeString("fr-FR",{timeZone:"Europe/Paris"})+"<br>"+
"Berlin: "+now.toLocaleTimeString("de-DE",{timeZone:"Europe/Berlin"})

}

setInterval(updateClock,1000)
updateClock()

async function weather(){

let res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true")
let data=await res.json()

document.getElementById("weather").innerHTML=
"🌡 "+data.current_weather.temperature+" °C<br>💨 "+data.current_weather.windspeed+" km/h"

}

setInterval(weather,60000)
weather()

async function crypto(){

let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,okb,sui,pi-network&vs_currencies=usd")
let data=await res.json()

let html="<tr><th>Coin</th><th>Price</th></tr>"

for(let c in data){
html+="<tr><td>"+c+"</td><td>"+data[c].usd+"$</td></tr>"
}

document.getElementById("crypto").innerHTML=html

}

setInterval(crypto,15000)
crypto()

async function topCrypto(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1")
let data=await res.json()

let html="<tr><th>#</th><th>Coin</th><th>Price</th></tr>"

data.forEach(c=>{
html+="<tr><td>"+c.market_cap_rank+"</td><td>"+c.name+"</td><td>"+c.current_price+"$</td></tr>"
})

document.getElementById("topcrypto").innerHTML=html

}

setInterval(topCrypto,20000)
topCrypto()

async function gold(){

let res=await fetch("https://api.metals.live/v1/spot")
let data=await res.json()

document.getElementById("gold").innerHTML="Gold: "+data[0].gold+" USD"

}

setInterval(gold,30000)
gold()

function sakura(){

let flower=document.createElement("div")

flower.className="sakura"
flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"
flower.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(flower)

setTimeout(()=>{flower.remove()},20000)

}

setInterval(sakura,800)

</script>

</body>
</html>
