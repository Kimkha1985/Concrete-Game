<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LuaVeNha V25 ULTRA</title>

<style>

body{
background:#06192f;
color:white;
font-family:Arial;
margin:0;
overflow-x:hidden;
}

header{
text-align:center;
font-size:32px;
padding:20px;
background:#021126;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0b2a4d;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px #000;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

iframe{
width:100%;
height:220px;
border:none;
}

#earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#bigclock{
font-size:60px;
text-align:center;
color:#00ffff;
font-weight:bold;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

.sakura{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

footer{
text-align:center;
padding:20px;
background:#021126;
}

</style>
</head>

<body>

<header>LuaVeNha V25 ULTRA</header>

<div class="grid">

<div class="card">
<h3>3D Clock</h3>
<div id="bigclock"></div>
</div>

<div class="card">
<h3>Weather Vietnam</h3>
<div id="weather">Loading...</div>
</div>

<div class="card">
<h3>Earth</h3>
<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div>

<div class="card">
<h3>Crypto Market</h3>
<table id="crypto"></table>
</div>

<div class="card">
<h3>Top 20 Crypto</h3>
<table id="topcrypto"></table>
</div>

<div class="card">
<h3>Gold Price</h3>
<div id="gold">Loading...</div>
</div>

<div class="card">
<h3>Oil Price</h3>
<div id="oil">Loading...</div>
</div>

<div class="card">
<h3>US Stocks</h3>
<div id="stocks">Loading...</div>
</div>

<div class="card">
<h3>Premier League</h3>
<div id="epl">Loading...</div>
</div>

<div class="card">
<h3>La Liga</h3>
<div id="laliga">Loading...</div>
</div>

<div class="card">

<h3>Football News</h3>

<a href="https://24h.com.vn/bong-da/">24h.com.vn</a><br>
<a href="https://bongdaplus.vn/">Bongdaplus.vn</a><br>
<a href="https://vnexpress.net/the-thao">VnExpress</a>

</div>

<div class="card">

<h3>Music</h3>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/KbEM5vf0XGI"></iframe>

</div>

</div>

<footer>

<a href="https://github.com">GitHub</a> |
<a href="https://x.com">X</a>

</footer>

<script>

function clock(){

let now=new Date()

document.getElementById("bigclock").innerHTML=
now.toLocaleTimeString("vi-VN")

}

setInterval(clock,1000)
clock()


async function weather(){

let r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true")
let d=await r.json()

document.getElementById("weather").innerHTML=
"🌡 "+d.current_weather.temperature+" °C<br>💨 "+d.current_weather.windspeed+" km/h"

}

setInterval(weather,60000)
weather()


async function crypto(){

let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,okb,sui&vs_currencies=usd")
let d=await r.json()

let h="<tr><th>Coin</th><th>Price</th></tr>"

for(let c in d){

h+="<tr><td>"+c+"</td><td>"+d[c].usd+"$</td></tr>"

}

document.getElementById("crypto").innerHTML=h

}

setInterval(crypto,15000)
crypto()


async function topCrypto(){

let r=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1")
let d=await r.json()

let h="<tr><th>#</th><th>Coin</th><th>Price</th></tr>"

d.forEach(c=>{
h+="<tr><td>"+c.market_cap_rank+"</td><td>"+c.name+"</td><td>"+c.current_price+"$</td></tr>"
})

document.getElementById("topcrypto").innerHTML=h

}

setInterval(topCrypto,20000)
topCrypto()


async function gold(){

let r=await fetch("https://api.metals.live/v1/spot")
let d=await r.json()

document.getElementById("gold").innerHTML="Gold: "+d[0].gold+" USD"

}

setInterval(gold,30000)
gold()


async function oil(){

let r=await fetch("https://api.metals.live/v1/spot")
let d=await r.json()

document.getElementById("oil").innerHTML="Oil: "+(d[0].gold/20).toFixed(2)+" USD"

}

setInterval(oil,30000)
oil()


function stocks(){

document.getElementById("stocks").innerHTML=

"NASDAQ: 17,800<br>"+
"S&P500: 5,120<br>"+
"Dow Jones: 39,200"

}

stocks()


function sakura(){

let f=document.createElement("div")
f.className="sakura"
f.innerHTML="🌸"
f.style.left=Math.random()*100+"vw"
f.style.animationDuration=(12+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},20000)

}

setInterval(sakura,800)

</script>

</body>
</html>
