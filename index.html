<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Lua Ve Nha V39</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#061a33,#020a18);
color:white;
}

header{
text-align:center;
font-size:34px;
padding:20px;
background:#021126;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0b2a4d;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px #000;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

iframe{
width:100%;
height:240px;
border:none;
border-radius:10px;
}

#earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.clock{
font-size:22px;
margin:6px;
}

.sakura{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

a{
color:#7ecbff;
text-decoration:none;
}

footer{
text-align:center;
padding:20px;
background:#021126;
}

</style>

</head>

<body>

<header>

Lua Ve Nha V39 Dashboard

</header>

<div class="grid">

<div class="card">

<h3>World Clock</h3>

<div class="clock" id="clockVN"></div>
<div class="clock" id="clockNY"></div>
<div class="clock" id="clockLondon"></div>
<div class="clock" id="clockTokyo"></div>

</div>

<div class="card">

<h3>Weather</h3>

<div id="weather">Loading...</div>

</div>

<div class="card">

<h3>Earth</h3>

<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

</div>

<div class="card">

<h3>Crypto Market</h3>

<table>

<tr>
<th>Asset</th>
<th>Price</th>
</tr>

<tr>
<td>Bitcoin</td>
<td id="btc"></td>
</tr>

<tr>
<td>Ethereum</td>
<td id="eth"></td>
</tr>

<tr>
<td>BNB</td>
<td id="bnb"></td>
</tr>

<tr>
<td>OKB</td>
<td id="okb"></td>
</tr>

<tr>
<td>SUI</td>
<td id="sui"></td>
</tr>

</table>

</div>

<div class="card">

<h3>Gold</h3>

<div id="gold"></div>

</div>

<div class="card">

<h3>Football News</h3>

<div id="news"></div>

</div>

<div class="card">

<h3>Premier League</h3>

<iframe src="https://www.scorebat.com/embed/league/england-premier-league/standings/"></iframe>

</div>

</div>

<footer>

Lua Ve Nha V39

</footer>

<script>

function worldClock(){

let now=new Date()

clockVN.innerHTML="🇻🇳 "+now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})
clockNY.innerHTML="🇺🇸 "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})
clockLondon.innerHTML="🇬🇧 "+now.toLocaleTimeString("en-GB",{timeZone:"Europe/London"})
clockTokyo.innerHTML="🇯🇵 "+now.toLocaleTimeString("ja-JP",{timeZone:"Asia/Tokyo"})

}

setInterval(worldClock,1000)



async function weather(){

let r=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true"
)

let d=await r.json()

weather.innerHTML=
"🌡 "+d.current_weather.temperature+" °C<br>"+
"💨 "+d.current_weather.windspeed+" km/h"

}

weather()

setInterval(weather,600000)



async function crypto(){

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd"
)

let d=await r.json()

btc.innerHTML=d.bitcoin.usd+" $"
eth.innerHTML=d.ethereum.usd+" $"
bnb.innerHTML=d.binancecoin.usd+" $"
okb.innerHTML=d.okb.usd+" $"
sui.innerHTML=d.sui.usd+" $"

}

crypto()

setInterval(crypto,30000)



async function gold(){

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd"
)

let d=await r.json()

gold.innerHTML=d["pax-gold"].usd+" USD"

}

gold()

setInterval(gold,60000)



async function footballNews(){

let r=await fetch(
"https://api.rss2json.com/v1/api.json?rss_url=https://vnexpress.net/rss/the-thao.rss"
)

let d=await r.json()

let html=""

for(let i=0;i<6;i++){

let n=d.items[i]

html+=`<a href="${n.link}" target="_blank">${n.title}</a><br><br>`

}

news.innerHTML=html

}

footballNews()

setInterval(footballNews,300000)



function sakura(){

let f=document.createElement("div")

f.className="sakura"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},20000)

}

setInterval(sakura,900)

</script>

</body>

</html>
