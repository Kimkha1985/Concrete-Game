<!DOCTYPE html>
<html lang="vi">

<head>

<title>LuaVeNha V38 ULTRA GOD</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#061a33,#020a18);
color:white;
}

header{
text-align:center;
font-size:34px;
padding:25px;
background:#021126;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0b2a4d;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px #000;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

iframe{
width:100%;
height:230px;
border:none;
border-radius:10px;
}

.music-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:12px;
}

#earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.clock{
font-size:28px;
margin:4px;
}

.sakura{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

footer{
text-align:center;
padding:20px;
background:#021126;
}

</style>

<script>

function clocks(){

let now=new Date()

vn.innerHTML="🇻🇳 "+now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})
utc.innerHTML="🌍 UTC "+now.toUTCString().split(" ")[4]
ny.innerHTML="🇺🇸 "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})
london.innerHTML="🇬🇧 "+now.toLocaleTimeString("en-GB",{timeZone:"Europe/London"})
tokyo.innerHTML="🇯🇵 "+now.toLocaleTimeString("ja-JP",{timeZone:"Asia/Tokyo"})
singapore.innerHTML="🇸🇬 "+now.toLocaleTimeString("en-SG",{timeZone:"Asia/Singapore"})

}

setInterval(clocks,1000)

async function weather(){

let r=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true"
)

let d=await r.json()

weather.innerHTML=
"🌡 "+d.current_weather.temperature+" °C<br>💨 "+d.current_weather.windspeed+" km/h"

}

weather()

async function crypto(){

let coins="bitcoin,ethereum,binancecoin,solana,ripple,cardano,dogecoin,avalanche-2,polkadot,chainlink,matic-network,litecoin,bitcoin-cash,uniswap,ethereum-classic,okb,sui,filecoin,aptos,cosmos"

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids="+coins+"&vs_currencies=usd"
)

let d=await r.json()

let html="<tr><th>Coin</th><th>Price</th></tr>"

for(let c in d){

html+="<tr><td>"+c+"</td><td>"+d[c].usd+" $</td></tr>"

}

cryptoTable.innerHTML=html

}

crypto()

setInterval(crypto,20000)

async function news(){

let r=await fetch(
"https://api.rss2json.com/v1/api.json?rss_url=https://vnexpress.net/rss/the-thao.rss"
)

let d=await r.json()

let html=""

for(let i=0;i<6;i++){

let n=d.items[i]

html+=`<a href="${n.link}" target="_blank">${n.title}</a><br>`

}

news.innerHTML=html

}

news()

function sakura(){

let f=document.createElement("div")

f.className="sakura"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},20000)

}

setInterval(sakura,900)

</script>
