<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard KimKha</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(#081b34,#0a2a52);
overflow-x:hidden;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
padding:15px;
max-width:1200px;
margin:auto;
}

.card{
background:#0f2c55;
padding:12px;
border-radius:14px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

h3{
margin-top:0;
color:#9ddcff;
}

iframe{
width:100%;
height:150px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

.clock{
font-size:34px;
color:#00ffff;
text-align:center;
}

#news a{
display:block;
color:#ffd700;
margin-bottom:8px;
text-decoration:none;
}

.footer{
text-align:center;
padding:20px;
font-size:18px;
}

.footer a{
color:#00eaff;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

.sakura{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->

<div>

<div class="card">
<h3>🎵 Music</h3>

<iframe src="https://www.youtube.com/embed/pw1MZFrJCMw"></iframe>
<iframe src="https://www.youtube.com/embed/x1ss2eVlDgs"></iframe>
<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/07QO_01Xl5s"></iframe>

<iframe src="https://www.youtube.com/embed/5VxQYp7D0LQ"></iframe>
<iframe src="https://www.youtube.com/embed/hTWKbfoikeg"></iframe>

</div>

</div>

<!-- CENTER -->

<div>

<div class="card">
<h3>🕒 Giờ Việt Nam</h3>
<div id="vnclock" class="clock"></div>
</div>

<div class="card">
<h3>🌍 Giờ Quốc Tế</h3>
<div id="worldclock" class="clock"></div>
</div>

<div class="card">
<h3>🌤 Weather HCM</h3>
<div>Ho Chi Minh City +32°C</div>
</div>

<div class="card">
<h3>💰 Crypto Market</h3>

BTC <span id="btc"></span><br>
ETH <span id="eth"></span><br>
BNB <span id="bnb"></span><br>
OKB <span id="okb"></span><br>
SUI <span id="sui"></span>

</div>

<div class="card">
<h3>🥇 Gold</h3>
<div id="gold"></div>
</div>

<div class="card">
<h3>🎵 Nhạc Phật</h3>

<iframe src="https://www.youtube.com/embed/pw1MZFrJCMw"></iframe>
<iframe src="https://www.youtube.com/embed/x1ss2eVlDgs"></iframe>
<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/07QO_01Xl5s"></iframe>

</div>

</div>

<!-- RIGHT -->

<div>

<div class="card">
<h3>🌍 Earth</h3>

<iframe src="https://www.youtube.com/embed/1Zt7J6bP6KQ"></iframe>

</div>

<div class="card">
<h3>⚽ Football News</h3>
<div id="news"></div>
</div>

<div class="card">
<h3>🎵 Music</h3>

<iframe src="https://www.youtube.com/embed/fLexgOxsZu0"></iframe>
<iframe src="https://www.youtube.com/embed/OPf0YbXqDm0"></iframe>
<iframe src="https://www.youtube.com/embed/JGwWNGJdvx8"></iframe>
<iframe src="https://www.youtube.com/embed/kXYiU_JCYtU"></iframe>
<iframe src="https://www.youtube.com/embed/eVTXPUF4Oz4"></iframe>
<iframe src="https://www.youtube.com/embed/tAGnKpE4NCI"></iframe>

</div>

</div>

</div>

<div class="footer">

<a href="https://github.com/kimkha1985">github.com/kimkha1985</a>

<a href="https://x.com/ChauKimKha">x.com/ChauKimKha</a>

</div>

<script>

function clock(){

let now=new Date()

vnclock.innerHTML=now.toLocaleTimeString("vi-VN")

worldclock.innerHTML=now.toLocaleTimeString("en-US",{timeZone:"UTC"})

}

setInterval(clock,1000)

clock()

async function crypto(){

let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd")

let d=await r.json()

btc.innerHTML=d.bitcoin.usd+" $"
eth.innerHTML=d.ethereum.usd+" $"
bnb.innerHTML=d.binancecoin.usd+" $"
okb.innerHTML=d.okb.usd+" $"
sui.innerHTML=d.sui.usd+" $"

}

crypto()
setInterval(crypto,30000)

async function gold(){

let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd")

let d=await r.json()

gold.innerHTML=d["pax-gold"].usd+" USD"

}

gold()

async function footballNews(){

let feeds=[
"https://vnexpress.net/rss/the-thao.rss",
"https://bongdaplus.vn/rss",
"https://www.espn.com/espn/rss/soccer/news"
]

let html=""

for(let f of feeds){

try{

let r=await fetch("https://api.rss2json.com/v1/api.json?rss_url="+f)

let d=await r.json()

for(let i=0;i<2;i++){

let n=d.items[i]

html+=`<a href="${n.link}" target="_blank">⭐ ${n.title}</a>`

}

}catch(e){}

}

news.innerHTML=html

}

footballNews()

function sakura(){

let f=document.createElement("div")

f.className="sakura"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),20000)

}

setInterval(sakura,800)

</script>

</body>
</html>
