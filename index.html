<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lua Ve Nha MASTER</title>

<style>

body{
margin:0;
font-family:Arial;
background:#06192f;
color:white;
}

.container{
display:grid;
grid-template-columns:320px 1fr 320px;
gap:20px;
padding:20px;
}

.card{
background:#0c223d;
border-radius:18px;
padding:15px;
box-shadow:0 0 15px #00eaff;
}

.title{
color:#00eaff;
font-size:20px;
margin-bottom:10px;
}

iframe{
width:100%;
height:180px;
border:none;
border-radius:12px;
margin-bottom:10px;
}

.clock{
font-size:48px;
text-align:center;
color:#00ffff;
}

.earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.crypto div{
display:flex;
justify-content:space-between;
padding:6px;
}

.news li{
margin-bottom:8px;
}

.footer{
display:flex;
justify-content:center;
gap:20px;
padding:25px;
}

.footer a{
padding:10px 20px;
background:#0c223d;
border-radius:12px;
color:#00ffff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->

<div class="card">

<div class="title">🎵 Music</div>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/dsaXgVd5cps"></iframe>
<iframe src="https://www.youtube.com/embed/w_kgRzsEXeM"></iframe>
<iframe src="https://www.youtube.com/embed/l3gNl5Pz1Z8"></iframe>

</div>

<!-- CENTER -->

<div>

<div class="card">

<div class="title">🕒 Giờ Việt Nam</div>

<div id="clock" class="clock"></div>

</div>

<div class="card">

<div class="title">🌍 Giờ Thế Giới</div>

Tokyo: <span id="tokyo"></span><br>
New York: <span id="newyork"></span><br>
London: <span id="london"></span>

</div>

<div class="card">

<div class="title">🌤 Weather HCM</div>

<div id="weather"></div>

</div>

<div class="card crypto">

<div class="title">₿ Crypto Market</div>

<div>BTC <span id="btc"></span></div>
<div>ETH <span id="eth"></span></div>
<div>BNB <span id="bnb"></span></div>
<div>SUI <span id="sui"></span></div>

</div>

<div class="card">

<div class="title">📈 Crypto Chart</div>

<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark"></iframe>

</div>

<div class="card">

<div class="title">🙏 Nhạc Phật</div>

<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/Sk0Re5Wa-QI"></iframe>

</div>

<div class="card">

<div class="title">📅 Today</div>

<div id="date"></div>

</div>

</div>

<!-- RIGHT -->

<div>

<div class="card">

<div class="title">🌍 Earth</div>

<img class="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

</div>

<div class="card">

<div class="title">⚽ Football News</div>

<ul class="news"></ul>

</div>

</div>

</div>

<div class="footer">

<a href="https://github.com/kimkha1985">
github.com/kimkha1985
</a>

<a href="https://x.com/ChauKimKha">
x.com/ChauKimKha
</a>

</div>

<script>

// CLOCK
function clock(){
clock.innerHTML=new Date().toLocaleTimeString("vi-VN")
}
setInterval(clock,1000)

// WORLD CLOCK
function world(){
tokyo.innerHTML=new Date().toLocaleTimeString("vi-VN",{timeZone:"Asia/Tokyo"})
newyork.innerHTML=new Date().toLocaleTimeString("vi-VN",{timeZone:"America/New_York"})
london.innerHTML=new Date().toLocaleTimeString("vi-VN",{timeZone:"Europe/London"})
}
setInterval(world,1000)

// DATE
date.innerHTML=new Date().toLocaleDateString("vi-VN")

// CRYPTO
async function crypto(){

let data=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,sui&vs_currencies=usd"
).then(r=>r.json())

btc.innerHTML=data.bitcoin.usd+"$"
eth.innerHTML=data.ethereum.usd+"$"
bnb.innerHTML=data.binancecoin.usd+"$"
sui.innerHTML=data.sui.usd+"$"

}
crypto()
setInterval(crypto,30000)

// WEATHER
async function weather(){

let data=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true"
).then(r=>r.json())

weather.innerHTML=data.current_weather.temperature+"°C"

}
weather()

// FOOTBALL NEWS
async function football(){

let data=await fetch("https://www.scorebat.com/video-api/v3/").then(r=>r.json())

let news=document.querySelector(".news")

news.innerHTML=""

for(let i=0;i<5;i++){

let li=document.createElement("li")

li.innerHTML="⭐ "+data.response[i].title

news.appendChild(li)

}

}

football()

</script>

</body>
</html>
