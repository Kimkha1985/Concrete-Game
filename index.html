<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Lua Ve Nha V40 ULTRA</title>

<style>

body{
background:#06192f;
color:white;
font-family:Arial;
margin:0;
}

header{
text-align:center;
font-size:32px;
padding:20px;
background:#021126;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0b2a4d;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px #000;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

iframe{
width:100%;
height:200px;
border:none;
}

#earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.clock3d{
font-size:48px;
text-align:center;
color:#00ffff;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

.sakura{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

footer{
text-align:center;
padding:20px;
background:#021126;
}

</style>

</head>

<body>

<header>Lua Ve Nha V40 ULTRA</header>

<div class="grid">

<div class="card">
<h3>⏰ Giờ Việt Nam</h3>
<div id="clockVN" class="clock3d"></div>
</div>

<div class="card">
<h3>🌍 World Clock</h3>
<div id="clockWorld" class="clock3d"></div>
</div>

<div class="card">
<h3>🌤 Weather HCM</h3>
<div id="weather"></div>
</div>

<div class="card">
<h3>🌍 Earth</h3>
<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div>

<div class="card">

<h3>🪙 Crypto Market</h3>

<table>

<tr><th>Coin</th><th>Price</th></tr>

<tr><td>BTC</td><td id="btc"></td></tr>
<tr><td>ETH</td><td id="eth"></td></tr>
<tr><td>BNB</td><td id="bnb"></td></tr>
<tr><td>OKB</td><td id="okb"></td></tr>
<tr><td>SUI</td><td id="sui"></td></tr>
<tr><td>PI</td><td id="pi"></td></tr>

</table>

</div>

<div class="card">

<h3>🟡 Gold Price</h3>

<div id="gold"></div>

</div>

<div class="card">

<h3>⚽ Football News</h3>

<div id="news"></div>

</div>

<div class="card">

<h3>🎵 Music</h3>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/dsaXgVd5cps"></iframe>
<iframe src="https://www.youtube.com/embed/w_kgRzsEXeM"></iframe>
<iframe src="https://www.youtube.com/embed/l3gNl5Pz1Z8"></iframe>
<iframe src="https://www.youtube.com/embed/3OeEinNn--E"></iframe>
<iframe src="https://www.youtube.com/embed/8Vqlecx98U4"></iframe>
<iframe src="https://www.youtube.com/embed/LmGERikvn6w"></iframe>
<iframe src="https://www.youtube.com/embed/35TSAMLvzJQ"></iframe>

</div>

</div>

<footer>

<a href="https://github.com">GitHub</a> |
<a href="https://x.com">X</a>

</footer>

<script>

function clock(){

let now=new Date()

document.getElementById("clockVN").innerHTML=
now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})

document.getElementById("clockWorld").innerHTML=
now.toUTCString().split(" ")[4]

}

setInterval(clock,1000)
clock()

async function weather(){

let r=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true"
)

let d=await r.json()

document.getElementById("weather").innerHTML=
"🌡 "+d.current_weather.temperature+"°C<br>💨 "+d.current_weather.windspeed+" km/h"

}

weather()
setInterval(weather,600000)

async function crypto(){

let r=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui,pax-gold&vs_currencies=usd"
)

let d=await r.json()

btc.innerHTML=d.bitcoin.usd+" $"
eth.innerHTML=d.ethereum.usd+" $"
bnb.innerHTML=d.binancecoin.usd+" $"
okb.innerHTML=d.okb.usd+" $"
sui.innerHTML=d.sui.usd+" $"
pi.innerHTML="N/A"

gold.innerHTML=d["pax-gold"].usd+" USD"

}

crypto()
setInterval(crypto,30000)

async function footballNews(){

let feeds=[

"https://vnexpress.net/rss/the-thao.rss",
"https://bongdaplus.vn/rss",
"https://www.espn.com/espn/rss/soccer/news"

]

let html=""

for(let f of feeds){

try{

let r=await fetch(
"https://api.rss2json.com/v1/api.json?rss_url="+f
)

let d=await r.json()

for(let i=0;i<2;i++){

let n=d.items[i]

html+=`<a href="${n.link}" target="_blank">⚽ ${n.title}</a><br><br>`

}

}catch(e){}

}

document.getElementById("news").innerHTML=html

}

footballNews()
setInterval(footballNews,300000)

function sakura(){

let f=document.createElement("div")

f.className="sakura"
f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},20000)

}

setInterval(sakura,900)

</script>

</body>
</html>
