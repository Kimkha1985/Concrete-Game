<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Concrete V50 ULTRA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#06192f;
color:white;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
padding:10px;
}

.panel{
background:#081c34;
border-radius:12px;
padding:10px;
box-shadow:0 0 10px cyan;
}

.title{
color:#00ffff;
font-weight:bold;
margin-bottom:8px;
}

.video img{
width:100%;
border-radius:10px;
}

.clock{
font-size:28px;
color:#00ffff;
}

.earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#020d18;
display:flex;
justify-content:space-between;
padding:8px 20px;
}

.footer a{
color:#00ffff;
text-decoration:none;
}

.flower{
position:fixed;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}

</style>

</head>

<body>

<div class="container">

<!-- MUSIC LEFT -->

<div class="panel">

<div class="title">🎵 Music</div>

<img src="https://img.youtube.com/vi/qDQi31U9qrE/0.jpg">
<img src="https://img.youtube.com/vi/EMb_IyLEQtw/0.jpg">
<img src="https://img.youtube.com/vi/pRpeEdMmmQ0/0.jpg">
<img src="https://img.youtube.com/vi/dsaXgVd5cps/0.jpg">
<img src="https://img.youtube.com/vi/w_kgRzsEXeM/0.jpg">

</div>

<!-- CENTER -->

<div class="panel">

<div class="title">🕒 Vietnam Time</div>

<div class="clock" id="vn"></div>

<div id="tokyo"></div>
<div id="newyork"></div>
<div id="london"></div>

<hr>

<div id="calendar"></div>

<hr>

<div class="title">🌦 Weather</div>

<div id="weather">Loading...</div>

<hr>

<div class="title">🌍 Earth</div>

<img class="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<hr>

<div class="title">₿ Crypto</div>

<div>BTC: <span id="btc"></span></div>
<div>ETH: <span id="eth"></span></div>
<div>BNB: <span id="bnb"></span></div>
<div>OKB: <span id="okb"></span></div>
<div>SUI: <span id="sui"></span></div>

</div>

<!-- RIGHT -->

<div class="panel">

<div class="title">⚽ Football News</div>

<ul id="news"></ul>

<hr>

<div class="title">🙏 Nhạc Phật</div>

<img src="https://img.youtube.com/vi/l3gNl5Pz1Z8/0.jpg">
<img src="https://img.youtube.com/vi/3OeEinNn--E/0.jpg">
<img src="https://img.youtube.com/vi/8Vqlecx98U4/0.jpg">
<img src="https://img.youtube.com/vi/LmGERikvn6w/0.jpg">
<img src="https://img.youtube.com/vi/35TSAMLvzJQ/0.jpg">

</div>

</div>

<footer class="footer">

<a href="https://github.com/Kimkha1985">GitHub</a>

<a href="https://x.com/ChauKimKha">X</a>

</footer>

<script>

/* CLOCK */

function clock(){

vn.innerHTML=new Date().toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})

tokyo.innerHTML="Tokyo: "+new Date().toLocaleTimeString("en-US",{timeZone:"Asia/Tokyo"})

newyork.innerHTML="New York: "+new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York"})

london.innerHTML="London: "+new Date().toLocaleTimeString("en-US",{timeZone:"Europe/London"})

}

setInterval(clock,1000)
clock()

/* CALENDAR */

calendar.innerHTML=new Date().toLocaleDateString("vi-VN",
{weekday:"long",year:"numeric",month:"long",day:"numeric"})

/* WEATHER */

async function weather(){

try{

let r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true")

let d=await r.json()

weather.innerHTML="Nhiệt độ: "+d.current_weather.temperature+"°C"

}catch{

weather.innerHTML="Weather offline"

}

}

weather()

setInterval(weather,300000)

/* CRYPTO */

async function crypto(){

try{

let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd")

let d=await r.json()

btc.innerHTML=d.bitcoin.usd+"$"
eth.innerHTML=d.ethereum.usd+"$"
bnb.innerHTML=d.binancecoin.usd+"$"
okb.innerHTML=d.okb.usd+"$"
sui.innerHTML=d.sui.usd+"$"

}catch{}

}

crypto()

setInterval(crypto,30000)

/* NEWS */

async function news(){

try{

let r=await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.goal.com/vi/feeds/news")

let d=await r.json()

let html=""

d.items.slice(0,5).forEach(n=>{

html+="<li>"+n.title+"</li>"

})

news.innerHTML=html

}catch{}

}

news()

setInterval(news,60000)

/* FLOWER */

function flower(){

let f=document.createElement("div")

f.className="flower"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"%"

f.style.fontSize=(15+Math.random()*15)+"px"

f.style.animationDuration=(6+Math.random()*6)+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),12000)

}

setInterval(flower,2000)

</script>

</body>
</html>
